<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-label="Xionprotech icon">
  <title>Xionprotech</title>
  <defs>
    <!-- Deep premium field: near-black navy with subtle vertical depth -->
    <linearGradient id="xionField" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#141B2E"/>
      <stop offset="1" stop-color="#0A0E1A"/>
    </linearGradient>
    <!-- Electric accent for the leading chevron -->
    <linearGradient id="xionAccent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4F8CFF"/>
      <stop offset="0.55" stop-color="#3D6DFF"/>
      <stop offset="1" stop-color="#6E5BFF"/>
    </linearGradient>
    <!-- Cool white for the trailing chevron -->
    <linearGradient id="xionWhite" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#C9D6F2"/>
    </linearGradient>
  </defs>

  <!-- App-icon rounded-square container -->
  <rect x="0" y="0" width="1024" height="1024" rx="228" ry="228" fill="url(#xionField)"/>
  <!-- 1px inner hairline for crisp edge on light bg -->
  <rect x="4" y="4" width="1016" height="1016" rx="224" ry="224" fill="none" stroke="#2A3552" stroke-width="2" opacity="0.55"/>

  <!--
    The X is built from TWO converging chevrons of equal 116px stroke.
    A diagonal negative-space slit (the "forward-slash of motion") separates
    them, so the mark reads as an X that is also two arrows leaning into
    forward progress. Geometry is mirror-symmetric about x=512.
    Safe area: mark spans x[236..788], y[268..756]. Margin >= 236px.
  -->
  <g>
    <!-- Trailing chevron (white): the back stroke of the X, opening right -->
    <path fill="url(#xionWhite)" d="
      M 236 268
      L 352 268
      L 540 512
      L 352 756
      L 236 756
      L 424 512
      Z"/>

    <!-- Leading chevron (electric): the front stroke, opening left,
         set forward to create the negative-space diagonal slit -->
    <path fill="url(#xionAccent)" d="
      M 788 268
      L 672 268
      L 484 512
      L 672 756
      L 788 756
      L 600 512
      Z"/>
  </g>
</svg>
