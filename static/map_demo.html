<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SnapCal — vector map demo</title>
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<style>
  html,body{margin:0;height:100%;font-family:-apple-system,system-ui,Segoe UI,sans-serif;background:#F1F0EB;color:#1f2430}
  #wrap{max-width:480px;margin:0 auto;padding:16px}
  h2{margin:8px 2px 2px;font-size:19px;font-weight:800}
  .sub{color:#6b7280;font-size:12.5px;margin:4px 2px 12px;line-height:1.4}
  #map{height:440px;border-radius:18px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.14)}
</style>
</head>
<body>
<div id="wrap">
  <h2>Vector map &mdash; real pins, names, no overlap</h2>
  <div class="sub">Teardrop pins colored by health &middot; restaurant names beside them &middot; names auto-space &amp; never overlap (even zoomed out) &middot; <b>free, no key</b></div>
  <div id="map"></div>
</div>
<script>
var TIER_COLOR = {1:"#16A34A", 2:"#EAB308", 3:"#9F1239", 4:"#DC2626"};
var spots = [
  {n:"McDonald's",    t:2, lat:40.2526906, lng:-75.6598063},
  {n:"Wendy's",       t:2, lat:40.2536805, lng:-75.6604551},
  {n:"Chipotle",      t:1, lat:40.2547152, lng:-75.6598395},
  {n:"Jersey Mike's", t:1, lat:40.2548516, lng:-75.6597419},
  {n:"Panera Bread",  t:1, lat:40.255475,  lng:-75.6606403},
  {n:"Wawa",          t:3, lat:40.2327142, lng:-75.6582694},
  {n:"Dunkin'",       t:3, lat:40.2541249, lng:-75.6655103},
  {n:"Subway",        t:1, lat:40.2545495, lng:-75.6654053},
  {n:"Starbucks",     t:1, lat:40.2646022, lng:-75.6512564},
  {n:"Panda Express", t:2, lat:40.2656726, lng:-75.6525714}
];
var fc = { type:"FeatureCollection", features: spots.map(function(s){
  return { type:"Feature", geometry:{type:"Point", coordinates:[s.lng, s.lat]}, properties:{name:s.n, tier:s.t} };
}) };
var map = new maplibregl.Map({ container:"map", style:"https://tiles.openfreemap.org/styles/liberty", center:[-75.6555,40.2495], zoom:13 });
map.addControl(new maplibregl.NavigationControl({showCompass:false}), "top-left");

function pinSVG(color){
  return '<svg xmlns="http://www.w3.org/2000/svg" width="28" height="38" viewBox="0 0 28 38">'
    + '<path d="M14 0C6.3 0 0 6.3 0 14c0 9.6 14 24 14 24s14-14.4 14-24C28 6.3 21.7 0 14 0z" fill="' + color + '" stroke="#fff" stroke-width="2.5"/>'
    + '<circle cx="14" cy="14" r="5" fill="#fff"/></svg>';
}
function loadPin(name, color){
  return new Promise(function(res){
    var img = new Image(28, 38);
    img.onload = function(){ if (!map.hasImage(name)) map.addImage(name, img); res(); };
    img.src = "data:image/svg+xml;base64," + btoa(pinSVG(color));
  });
}
map.on("load", function(){
  Promise.all([loadPin("pin-1",TIER_COLOR[1]), loadPin("pin-2",TIER_COLOR[2]), loadPin("pin-3",TIER_COLOR[3]), loadPin("pin-4",TIER_COLOR[4])]).then(function(){
    map.addSource("spots", { type:"geojson", data: fc });
    map.addLayer({ id:"spot-pins", type:"symbol", source:"spots", layout:{
      "icon-image": ["concat", "pin-", ["to-string", ["get","tier"]]],
      "icon-size": 0.8, "icon-anchor": "bottom", "icon-allow-overlap": true
    }});
    map.addLayer({ id:"spot-labels", type:"symbol", source:"spots", layout:{
      "text-field": ["get","name"],
      "text-font": ["Noto Sans Regular"],
      "text-size": 12.5,
      "text-variable-anchor": ["top","bottom","left","right"],
      "text-radial-offset": 1.1,
      "text-justify": "auto",
      "text-allow-overlap": false,
      "text-optional": true
    }, paint:{ "text-color":"#16221c", "text-halo-color":"#ffffff", "text-halo-width":1.8 }});
    var you = document.createElement("div");
    you.style.cssText = "width:16px;height:16px;border-radius:50%;background:#2563EB;border:3px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.5)";
    new maplibregl.Marker({element:you}).setLngLat([-75.6496,40.2452]).addTo(map);
    var b = new maplibregl.LngLatBounds(); b.extend([-75.6496,40.2452]);
    spots.forEach(function(s){ b.extend([s.lng,s.lat]); });
    map.fitBounds(b, { padding:54, maxZoom:14, duration:0 });
  });
});
</script>
</body>
</html>
