<!DOCTYPE html>
<html lang="en" data-theme="platinum">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>SnapCal — Premium Home · Theme Configurator</title>
<style>
  /* ===== THEME TRIMS (Mercedes-style) — swap data-theme on <html> ===== */
  :root[data-theme="platinum"]{
    --bg:#EFEDE7;--glow:#FAF8F3;--card:#FFFFFF;--card2:#FBFBF8;--ink:#16201C;--ink2:#5B6661;--ink3:#9AA3A0;--line:#E7E7E1;
    --brand:#059669;--pro:#F26D6D;--carb:#E8A24C;--fat:#5B8DEF;--ic1:#34D399;--ic2:#059669;
  }
  :root[data-theme="carbon"]{
    --bg:#0E1114;--glow:#1B232B;--card:#161A1F;--card2:#14181D;--ink:#F4F6F8;--ink2:#8A949C;--ink3:#5A636B;--line:#242A31;
    --brand:#34E2C8;--pro:#FF5A5F;--carb:#F5B544;--fat:#34E2C8;--ic1:#2FE0C6;--ic2:#119C8A;
  }
  :root[data-theme="champagne"]{
    --bg:#1B1410;--glow:#34261A;--card:#241A13;--card2:#2A1F16;--ink:#F6EFE6;--ink2:#B9A488;--ink3:#7E6E5A;--line:#33271C;
    --brand:#E6C079;--pro:#E8857A;--carb:#E6C079;--fat:#8FB3C8;--ic1:#F0CE92;--ic2:#C39A52;
  }
  :root[data-theme="aurora"]{
    --bg:#0B0E1A;--glow:#161E3D;--card:#10142A;--card2:#12172E;--ink:#EEF1FB;--ink2:#9AA0C4;--ink3:#5E6388;--line:#1E2542;
    --brand:#8E7BFF;--pro:#FF6E9C;--carb:#46D6E0;--fat:#8E7BFF;--ic1:#9E8CFF;--ic2:#5B46D6;
  }
  :root{ --r:24px; --ease-spring:cubic-bezier(.34,1.1,.4,1);
    --e2:0 1px 2px rgba(0,0,0,.16), 0 8px 20px rgba(0,0,0,.14);
    --e3:0 2px 4px rgba(0,0,0,.20), 0 18px 38px rgba(0,0,0,.20);
    --bevel:inset 0 1px 0 rgba(255,255,255,.10), inset 0 -2px 4px rgba(0,0,0,.10); }
  :root[data-theme="platinum"]{ --bevel:inset 0 1px 0 rgba(255,255,255,.9), inset 0 -2px 4px rgba(20,40,30,.05);
    --e2:0 1px 2px rgba(20,40,30,.10), 0 8px 20px rgba(20,40,30,.10); --e3:0 2px 4px rgba(20,40,30,.12), 0 18px 38px rgba(20,40,30,.16); }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{min-height:100vh;background:radial-gradient(125% 85% at 22% -5%, var(--glow) 0%, var(--bg) 58%);
       color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
       -webkit-font-smoothing:antialiased;display:flex;justify-content:center;overflow-x:hidden;transition:background .5s ease,color .5s ease}
  .phone{width:100%;max-width:430px;padding:22px 18px 36px;user-select:none}
  .head{display:flex;align-items:baseline;justify-content:space-between;margin:6px 4px 20px}
  .head h1{font-size:30px;font-weight:850;letter-spacing:-.03em}
  .head .date{color:var(--ink2);font-size:14px;font-weight:600}
  .quick{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
  .tile{background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--line);border-radius:18px;
        padding:15px 8px 13px;display:flex;flex-direction:column;align-items:center;gap:9px;box-shadow:var(--e2),var(--bevel);
        cursor:pointer;transition:transform .14s var(--ease-spring),box-shadow .14s,background .5s,border-color .5s}
  .tile:active{transform:translateY(2px) scale(.97)}
  .tile .ic{width:46px;height:46px;border-radius:15px;display:flex;align-items:center;justify-content:center;color:#fff;
        background:linear-gradient(145deg,var(--ic1),var(--ic2));
        box-shadow:0 5px 12px rgba(0,0,0,.28), inset 0 1px 0 rgba(255,255,255,.4), inset 0 -3px 6px rgba(0,0,0,.18);transition:background .5s}
  .tile .ic svg{width:23px;height:23px}
  .tile .l{font-size:12.5px;font-weight:750;color:var(--ink)}
  .hero{background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--line);border-radius:var(--r);
        box-shadow:var(--e3),var(--bevel);padding:18px 18px 6px;margin-bottom:16px;transition:background .5s,border-color .5s}
  .ring-stage{position:relative;width:236px;height:236px;margin:6px auto 2px;touch-action:none}
  #ringCanvas{position:absolute;inset:0;z-index:1;cursor:grab}
  #spark{position:absolute;width:64px;height:64px;transform:translate(-50%,-50%);opacity:0;pointer-events:none;z-index:4;filter:drop-shadow(0 0 11px #fff)}
  #spark svg{width:100%;height:100%;animation:tw 1s ease-in-out infinite}
  #spark path,#spark circle{fill:#fff}
  @keyframes tw{0%,100%{transform:scale(.75) rotate(0);opacity:.8}50%{transform:scale(1.2) rotate(18deg);opacity:1}}
  .ring-mid{position:absolute;inset:0;z-index:3;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
  .ring-mid .big{font-size:52px;font-weight:850;letter-spacing:-.03em;line-height:1;font-variant-numeric:tabular-nums}
  .ring-mid .lbl{font-size:13.5px;font-weight:650;color:var(--ink2);margin-top:3px}
  .meta{display:flex;justify-content:space-around;border-top:1px solid var(--line);margin-top:8px;padding:13px 0 9px}
  .meta .v{font-size:18px;font-weight:800;font-variant-numeric:tabular-nums;text-align:center}
  .meta .k{font-size:11px;font-weight:700;color:var(--ink3);letter-spacing:.08em;margin-top:2px;text-align:center}
  .macros{background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--line);border-radius:var(--r);
        box-shadow:var(--e2),var(--bevel);padding:20px 14px;display:grid;grid-template-columns:repeat(3,1fr);gap:6px;transition:background .5s,border-color .5s}
  .mac{display:flex;flex-direction:column;align-items:center;gap:8px}
  .mr{position:relative;width:74px;height:74px}.mr svg{transform:rotate(-90deg)}
  .mr .pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:850;font-variant-numeric:tabular-nums}
  .mac .nm{font-size:13px;font-weight:750}.mac .of{font-size:11px;color:var(--ink3);font-weight:600}
  /* the configurator */
  .pick-h{font-size:12px;font-weight:800;letter-spacing:.1em;color:var(--ink3);margin:22px 4px 10px}
  .picker{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
  .chip{display:flex;align-items:center;gap:9px;background:linear-gradient(180deg,var(--card),var(--card2));border:1.5px solid var(--line);
        border-radius:14px;padding:12px 13px;cursor:pointer;font-family:inherit;font-size:13.5px;font-weight:750;color:var(--ink);
        box-shadow:var(--e2);transition:transform .12s,border-color .2s,box-shadow .2s}
  .chip:active{transform:scale(.97)}
  .chip.on{border-color:var(--brand);box-shadow:0 0 0 1px var(--brand), 0 6px 16px rgba(0,0,0,.18)}
  .chip .sw{width:18px;height:18px;border-radius:50%;flex:0 0 auto;box-shadow:inset 0 0 0 1px rgba(255,255,255,.3),0 1px 2px rgba(0,0,0,.3)}
  .tag{display:block;margin:20px auto 0;color:var(--ink3);font-size:12px;text-align:center}
</style>
<script type="importmap">
{ "imports": { "three":"https://unpkg.com/three@0.184.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.184.0/examples/jsm/" } }
</script>
</head>
<body>
<div class="phone">
  <div class="head"><h1>Your Day</h1><div class="date">Tuesday, Jun 23</div></div>
  <div class="quick">
    <div class="tile"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M4 14a8 8 0 0 1 16 0"/><path d="M12 6V3M5 8 3.5 6.5M19 8l1.5-1.5"/><circle cx="12" cy="14" r="2.2"/></svg></span><span class="l">Coach Cal</span></div>
    <div class="tile"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.5 3h2l2.5 12.5a2 2 0 0 0 2 1.5h8.5a2 2 0 0 0 2-1.6L21.5 8H6"/></svg></span><span class="l">Grocery</span></div>
    <div class="tile"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/></svg></span><span class="l">Meal Plan</span></div>
  </div>
  <div class="hero">
    <div class="ring-stage">
      <canvas id="ringCanvas"></canvas>
      <div id="spark" aria-hidden="true"><svg viewBox="0 0 100 100"><path d="M50 0 L53 47 L100 50 L53 53 L50 100 L47 53 L0 50 L47 47 Z"/><circle cx="50" cy="50" r="7"/></svg></div>
      <div class="ring-mid"><div class="big">1,420</div><div class="lbl">Calories left</div></div>
    </div>
    <div class="meta">
      <div><div class="v">580</div><div class="k">EATEN</div></div>
      <div><div class="v">2,000</div><div class="k">GOAL</div></div>
      <div><div class="v">2</div><div class="k">MEALS</div></div>
    </div>
  </div>
  <div class="macros">
    <div class="mac"><div class="mr"><svg width="74" height="74"><circle cx="37" cy="37" r="30" fill="none" stroke="var(--line)" stroke-width="8"/><circle cx="37" cy="37" r="30" fill="none" stroke="var(--pro)" stroke-width="8" stroke-linecap="round" stroke-dasharray="188.5" stroke-dashoffset="66"/></svg><div class="pct" style="color:var(--pro)">65%</div></div><div class="nm">Protein</div><div class="of">98 / 150 g</div></div>
    <div class="mac"><div class="mr"><svg width="74" height="74"><circle cx="37" cy="37" r="30" fill="none" stroke="var(--line)" stroke-width="8"/><circle cx="37" cy="37" r="30" fill="none" stroke="var(--carb)" stroke-width="8" stroke-linecap="round" stroke-dasharray="188.5" stroke-dashoffset="113"/></svg><div class="pct" style="color:var(--carb)">40%</div></div><div class="nm">Carbs</div><div class="of">80 / 200 g</div></div>
    <div class="mac"><div class="mr"><svg width="74" height="74"><circle cx="37" cy="37" r="30" fill="none" stroke="var(--line)" stroke-width="8"/><circle cx="37" cy="37" r="30" fill="none" stroke="var(--fat)" stroke-width="8" stroke-linecap="round" stroke-dasharray="188.5" stroke-dashoffset="132"/></svg><div class="pct" style="color:var(--fat)">30%</div></div><div class="nm">Fat</div><div class="of">20 / 65 g</div></div>
  </div>
  <div class="pick-h">CHOOSE YOUR DASHBOARD</div>
  <div class="picker">
    <button class="chip" data-t="platinum"><span class="sw" style="background:#C9C9C2"></span>Platinum Classic</button>
    <button class="chip" data-t="carbon"><span class="sw" style="background:#34E2C8"></span>Carbon Sport</button>
    <button class="chip" data-t="champagne"><span class="sw" style="background:#E6C079"></span>Champagne Lounge</button>
    <button class="chip" data-t="aurora"><span class="sw" style="background:linear-gradient(90deg,#8E7BFF,#46D6E0)"></span>Onyx Aurora</button>
  </div>
  <span class="tag">Tap a trim · drag the ring · your pick saves to your profile</span>
</div>
<script type="module">
import * as THREE from 'three';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
const canvas=document.getElementById('ringCanvas'), spark=document.getElementById('spark'), S=236;
const renderer=new THREE.WebGLRenderer({canvas,alpha:true,antialias:true,powerPreference:'high-performance'});
renderer.setSize(S,S);renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));renderer.setClearAlpha(0);
renderer.toneMapping=THREE.ACESFilmicToneMapping;
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(34,1,0.1,100);camera.position.set(0,0,3.7);
scene.environment=new THREE.PMREMGenerator(renderer).fromScene(new RoomEnvironment(),0.04).texture;
const mat=new THREE.MeshPhysicalMaterial({color:0xffffff,metalness:1,roughness:0.02,clearcoat:0.7,clearcoatRoughness:0.03,envMapIntensity:2.0});
const ring=new THREE.Mesh(new THREE.TorusGeometry(1.0,0.115,64,240),mat);ring.rotation.x=0.1;scene.add(ring);
const dir=new THREE.DirectionalLight(0xffffff,2.2);dir.position.set(2,3,2.5);scene.add(dir);
const dir2=new THREE.DirectionalLight(0x46d6e0,0);dir2.position.set(-2.5,-2,2);scene.add(dir2);
scene.add(new THREE.AmbientLight(0xffffff,0.15));
const THEMES={
  platinum:{color:0xffffff,rough:0.02,cc:0.7,ccr:0.03,env:2.0,lc:0xffffff,li:2.2,exp:1.05,irid:0,li2:0},
  carbon:{color:0x9aa3a8,rough:0.10,cc:0.5,ccr:0.1,env:1.6,lc:0xcfe6ff,li:2.6,exp:0.92,irid:0,li2:0},
  champagne:{color:0xe6c079,rough:0.16,cc:0.45,ccr:0.1,env:1.5,lc:0xffe3b0,li:2.0,exp:1.0,irid:0,li2:0},
  aurora:{color:0xc7c2ff,rough:0.05,cc:0.9,ccr:0.02,env:2.4,lc:0x8e7bff,li:2.0,exp:1.08,irid:1.0,lc2:0x46d6e0,li2:1.8},
};
function setFinish(f){
  mat.color.setHex(f.color);mat.roughness=f.rough;mat.clearcoat=f.cc;mat.clearcoatRoughness=f.ccr;mat.envMapIntensity=f.env;
  mat.iridescence=f.irid||0; if(f.irid){mat.iridescenceIOR=1.6;mat.iridescenceThicknessRange=[120,420];}
  mat.needsUpdate=true;
  dir.color.setHex(f.lc);dir.intensity=f.li;
  dir2.color.setHex(f.lc2||0xffffff);dir2.intensity=f.li2||0;
  renderer.toneMappingExposure=f.exp;
}
function applyTheme(key){
  document.documentElement.setAttribute('data-theme',key);
  setFinish(THEMES[key]);
  document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('on',c.dataset.t===key));
  try{localStorage.setItem('snapcal.theme',key);}catch(e){}
}
document.querySelectorAll('.chip').forEach(c=>c.addEventListener('click',()=>applyTheme(c.dataset.t)));
let dragging=false;
function rub(e){const r=canvas.getBoundingClientRect(),dx=e.clientX-(r.left+r.width/2),dy=e.clientY-(r.top+r.height/2),d=Math.hypot(dx,dy)||1,R=100;
  spark.style.left=(r.width/2+dx/d*R)+'px';spark.style.top=(r.height/2+dy/d*R)+'px';spark.style.opacity='1';}
canvas.addEventListener('pointerdown',e=>{dragging=true;canvas.setPointerCapture(e.pointerId);rub(e);});
canvas.addEventListener('pointermove',e=>{if(dragging)rub(e);});
const stop=()=>{dragging=false;spark.style.opacity='0';};
canvas.addEventListener('pointerup',stop);canvas.addEventListener('pointercancel',stop);
(function loop(){renderer.render(scene,camera);requestAnimationFrame(loop);})();
applyTheme(localStorage.getItem('snapcal.theme')||'platinum');
</script>
</body>
</html>
